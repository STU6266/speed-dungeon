services:
  - type: web
    name: speed-dungeon
    runtime: static
    buildCommand: npm test && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    headers:
      - path: /*
        name: X-Frame-Options
        value: sameorigin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
